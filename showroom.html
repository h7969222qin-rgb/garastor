<style>

.card img { width:100%; height:240px; object-fit:cover; display:block; }
.card-info { padding:15px; }
.card-info h3 { font-size:1.1rem; font-weight:400; color:#fff; }

.footer-text { text-align:center; padding:20px; color:#444; font-size:0.75rem; }
.hero-img { max-width:100%; height:auto; display:block; margin:0 auto; }
.loading { text-align:center; padding:60px; color:#c8a45c; font-size:1.2rem; }
